# LMStudio server settings
lmstudio:
  base_url: "http://localhost:1234/v1"
  api_key: "lm-studio"   # placeholder; LMStudio ignores this
  model: "qwen2.5-72b-instruct"   # name as it appears in LMStudio

# Generation parameters
generation:
  temperature: 0.7
  top_p: 0.95
  # For thinking models (e.g. Qwen3): bump max_tokens substantially
  # (2000+) when enable_thinking is true, to leave room for both
  # reasoning and the ~300-word visible output.
  max_tokens: 500
  # Qwen3-style flag passed via chat_template_kwargs. false disables
  # chain-of-thought; true enables it. Run 1 of the experiment uses
  # false; run 2 uses true.
  enable_thinking: false

# Embedding model
embedding:
  model: "sentence-transformers/all-mpnet-base-v2"

# Paths (relative to project root)
paths:
  prompts_dir: "prompts"
  outputs_dir: "outputs"
  embeddings_dir: "embeddings"
  results_dir: "results"

# Analysis
analysis:
  bootstrap_iterations: 10000
  random_seed: 42
