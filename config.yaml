# LMStudio server settings
lmstudio:
  base_url: "http://localhost:1234/v1"
  api_key: "lm-studio"   # placeholder; LMStudio ignores this
  model: "qwen2.5-72b-instruct"   # name as it appears in LMStudio

# Generation parameters
generation:
  temperature: 0.7
  top_p: 0.95
  # max_tokens must cover the model's full output. For thinking-mode
  # runs, this includes the chain-of-thought, so 4000 leaves room for
  # ~3000 tokens of reasoning plus ~400 tokens of visible output (the
  # ~300-word target). For non-thinking runs, 500 is sufficient.
  max_tokens: 8000
  # Qwen3-style flag passed via chat_template_kwargs. true: thinking
  # run; false: no-thinking run. Note: not all LMStudio backends honor
  # this through the API; thinking suppression may need to be set in
  # the LMStudio model UI instead.
  enable_thinking: true

# Embedding model
embedding:
  model: "sentence-transformers/all-mpnet-base-v2"

# Paths (relative to project root)
paths:
  prompts_dir: "prompts"
  outputs_dir: "outputs"
  embeddings_dir: "embeddings"
  results_dir: "results"

# Analysis
analysis:
  bootstrap_iterations: 10000
  random_seed: 42
